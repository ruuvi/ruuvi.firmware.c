# Run SonarScanner

name: SonarCloud

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  sonar-scan:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

    - name: Checkout submodules
      run: git submodule update --init --recursive

    - name: Install Build Wrapper
      uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v6

    - name: Download Nordic SDK
      run: |
        if [ ! -d "nRF5_SDK_15.3.0_59ac345/modules" ]; then
          wget -q https://storage.ruuvi.com/nRF5_SDK_15.3.0_59ac345.zip
          unzip -q nRF5_SDK_15.3.0_59ac345.zip
        fi

    # Runs a single command using the runners shell
    - name: Compile project
      run: build-wrapper-linux-x86-64 --out-dir bw-output make sonar
      env:
        COMMIT: ${{ github.sha }}

    - name: Set up Ruby 3.0
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.0' # Not needed with a .ruby-version file
        bundler-cache: true # runs 'bundle install' and caches installed gems automatically

    # Runs a single command using the runners shell
    - name: Install Ceedling and GCovr
      run: |
        gem install ceedling
        sudo pip install gcovr

    - name: Run unit tests with coverage
      run: ceedling gcov:all

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          --define sonar.organization=ruuvi
          --define sonar.projectKey=ruuvi_ruuvi.firmware.c
          --define sonar.sources=./src
          --define sonar.cfamily.compile-commands=bw-output/compile_commands.json
          --define sonar.coverageReportPaths=build/artifacts/gcov/gcovr/GcovCoverageSonarQube.xml
          --define sonar.host.url=https://sonarcloud.io
